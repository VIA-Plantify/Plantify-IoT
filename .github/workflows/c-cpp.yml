name: PlatformIO CI

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install platformio

    - name: Build firmware
      run: |
        cd ArduinoProject
        pio run --environment megaatmega2560

    - name: Run tests
      run: |
        cd ArduinoProject
        pio test --environment native
